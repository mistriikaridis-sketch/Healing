<!DOCTYPE html>

<html lang="zh-CN">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Mind & Wisdom | 最终版</title>

    

    <script src="https://cdn.tailwindcss.com"></script>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Serif+SC:wght@300;500;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">



    <script>

        tailwind.config = {

            theme: {

                extend: {

                    colors: { 'paper': '#F9F7F2', 'ink': '#1A1A1A', 'sub': '#888888', 'gold': '#C5A059' },

                    fontFamily: { 'serif': ['"Playfair Display"', '"Noto Serif SC"', 'serif'], 'sans': ['"Lato"', 'sans-serif'] },

                    boxShadow: { 'deck': '0 25px 50px -12px rgba(0,0,0,0.4)', 'soft': '0 10px 30px rgba(0,0,0,0.1)' }

                }

            }

        }

    </script>



    <style>

        [x-cloak] { display: none !important; }

        body { background-color: #F9F7F2; color: #1A1A1A; overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent; }

        

        /* 绝对定位实现无痕切换 */

        .tab-content { position: absolute; inset: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }



        /* 3D 翻转 */

        .perspective-container { perspective: 1200px; }

        .preserve-3d { transform-style: preserve-3d; }

        .backface-hidden { backface-visibility: hidden; }

        .rotate-y-180 { transform: rotateY(180deg); }

        

        /* 牌堆拟真 */

        .deck-stack { position: relative; }

        .deck-stack::before, .deck-stack::after {

            content: ''; position: absolute; width: 100%; height: 100%;

            background: #fff; border: 1px solid #ddd; border-radius: 12px; pointer-events: none;

        }

        .deck-stack::before { top: 3px; left: 2px; z-index: -1; transform: rotate(1deg); }

        .deck-stack::after { top: 6px; left: 4px; z-index: -2; transform: rotate(-1deg); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }



        /* 卡牌纹理 */

        .card-texture {

            background-color: #fff;

            background-image: radial-gradient(#ddd 1px, transparent 1px);

            background-size: 15px 15px;

        }



        /* 动画 */

        @keyframes shuffle-move {

            0%, 100% { transform: translateY(0); }

            25% { transform: translateY(-10px) rotate(-2deg); }

            75% { transform: translateY(-5px) rotate(2deg); }

        }

        .animate-shuffle { animation: shuffle-move 0.2s infinite; }

        

        @keyframes breathe { 0%, 100% { opacity: 0.5; scale: 0.98; } 50% { opacity: 1; scale: 1.02; } }

        .animate-breathe { animation: breathe 3s infinite ease-in-out; }

    </style>

</head>



<body class="antialiased font-serif h-screen flex flex-col" x-data="appData()" x-init="initApp()" @click="activateAudio()">



    <header class="fixed top-0 w-full bg-paper/95 backdrop-blur z-50 border-b border-gray-200 h-16 flex items-center justify-between px-6 z-[100]">

        <h1 class="text-sm font-bold tracking-[0.2em] text-ink uppercase">Mind & Wisdom</h1>

        <nav class="flex space-x-8">

            <template x-for="tab in tabs" :key="tab.id">

                <button @click="switchTab(tab.id)"

                    class="text-[11px] font-sans tracking-[0.1em] transition-all duration-300 relative group"

                    :class="activeTab === tab.id ? 'text-ink font-bold' : 'text-sub hover:text-ink'">

                    <span x-text="tab.label"></span>

                    <div class="absolute -bottom-1 left-0 w-full h-0.5 bg-gold transition-transform origin-left duration-300"

                         :class="activeTab === tab.id ? 'scale-x-100' : 'scale-x-0 group-hover:scale-x-50'"></div>

                </button>

            </template>

        </nav>

    </header>



    <main class="flex-grow pt-16 w-full h-full relative overflow-hidden">



        <div class="tab-content" 

             x-show="activeTab === 'cards'" 

             x-transition:enter="transition ease-out duration-500"

             x-transition:enter-start="opacity-0"

             x-transition:enter-end="opacity-100"

             x-transition:leave="transition ease-in duration-300"

             x-transition:leave-start="opacity-100"

             x-transition:leave-end="opacity-0">

            

            <div x-show="!cardState.selected" class="flex flex-col items-center cursor-pointer group scale-90 md:scale-100 transition-transform" @click="drawRandomCard()">

                <div class="text-center mb-10">

                    <h2 class="text-4xl font-serif italic text-ink mb-2">The Oracle</h2>

                    <p class="text-[10px] font-sans tracking-[0.3em] text-sub uppercase">Click Deck to Draw</p>

                </div>



                <div class="relative w-64 h-96 deck-stack transition-all duration-200 group-active:scale-95"

                     :class="cardState.isShuffling ? 'animate-shuffle' : 'group-hover:-translate-y-2'">

                    <div class="w-full h-full rounded-2xl bg-white border border-gray-100 overflow-hidden relative shadow-2xl flex items-center justify-center card-texture">

                        <img src="images/back.jpg" class="w-full h-full object-cover" alt="Back" 

                             onerror="this.style.display='none';">

                        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">

                            <span class="text-4xl text-gold/60 font-serif">♦</span>

                        </div>

                    </div>

                </div>

                

                <div class="mt-8 h-4">

                    <p x-show="cardState.isShuffling" class="text-[10px] tracking-[0.2em] text-gold uppercase animate-pulse">Shuffling...</p>

                </div>

            </div>



            <div x-show="cardState.selected" class="absolute inset-0 z-50 bg-paper/98 backdrop-blur-md flex flex-col items-center justify-center p-6" x-cloak>

                <div class="relative w-[320px] h-[480px] shadow-2xl rounded-2xl animate-fade-in-up">

                    <div class="w-full h-full bg-white rounded-2xl overflow-hidden border-[10px] border-white shadow-inner flex items-center justify-center">

                        <img :src="currentCard.image" class="w-full h-full object-cover" alt="Card Front"

                             onerror="console.log('Img missing'); this.src='https://source.unsplash.com/600x900/?abstract,art,light&sig=' + currentCard.id; this.onerror=null;">

                    </div>

                </div>



                <div x-show="cardState.selected" class="mt-10 text-center animate-fade-in">

                    <p class="text-sm font-serif text-ink/60 italic mb-6">"What message does this image hold for you?"</p>

                    <button @click="resetCard()" class="px-8 py-3 text-[10px] font-sans tracking-[0.25em] text-ink border border-ink/30 hover:bg-ink hover:text-white transition-all uppercase rounded-sm">

                        Close

                    </button>

                </div>

            </div>

        </div>



        <div class="tab-content" 

             x-show="activeTab === 'book'" 

             x-transition:enter="transition ease-out duration-500"

             x-transition:enter-start="opacity-0"

             x-transition:enter-end="opacity-100"

             x-transition:leave="transition ease-in duration-300"

             x-transition:leave-start="opacity-100"

             x-transition:leave-end="opacity-0">

            

            <div class="relative w-[340px] h-[520px]">

                

                <div class="absolute inset-0 bg-white rounded-lg shadow-soft border border-gray-100 flex flex-col items-center justify-center p-10 text-center z-0 transition-opacity duration-1000"

                     :class="bookState.isOpen ? 'opacity-100 z-20' : 'opacity-0 z-0'">

                    

                    <div class="flex flex-col h-full justify-center w-full">

                        <span class="text-6xl text-gold/20 block mb-6 font-serif leading-none">“</span>

                        

                        <div class="overflow-y-auto max-h-[340px] no-scrollbar px-2 w-full">

                            <p class="text-[10px] font-sans text-sub uppercase tracking-wider mb-6 opacity-60" 

                               x-text="currentAnswer.en"></p>

                            <h3 class="text-xl font-serif text-ink font-bold leading-loose" 

                                x-html="formatAnswer(currentAnswer.cn)"></h3>

                        </div>

                        

                        <div class="w-8 h-px bg-gold/40 mt-8 mb-8 mx-auto flex-shrink-0"></div>

                        <button @click="resetBook()" class="text-[10px] text-sub tracking-[0.25em] uppercase border-b border-transparent hover:border-ink/30 pb-1 hover:text-ink transition-colors">

                            Ask Again

                        </button>

                    </div>

                </div>



                <div class="absolute inset-0 bg-[#F2F0E9] rounded-lg shadow-deck z-10 flex flex-col items-center justify-center transition-all duration-1000 border-l-4 border-gray-300"

                     :class="bookState.isOpen ? 'opacity-0 pointer-events-none transform scale-110' : 'opacity-100'"

                     @mousedown="startPress()" @touchstart.prevent="startPress()"

                     @mouseup="endPress()" @touchend="endPress()"

                     @mouseleave="endPress()">

                    

                    <div class="border border-gold/20 w-[88%] h-[92%] flex flex-col items-center justify-center relative p-4">

                        <h3 class="text-2xl font-serif font-bold text-ink tracking-[0.15em] mb-2">THE BOOK</h3>

                        <span class="text-[9px] font-sans tracking-[0.4em] text-sub uppercase">Of Wisdom</span>



                        <div class="mt-24 mb-24 w-24 flex flex-col items-center">

                            <p class="text-[10px] font-sans tracking-[0.2em] text-ink uppercase mb-2 transition-colors"

                               :class="bookState.isPressing ? 'text-gold' : 'text-ink'">

                               Press & Hold

                            </p>

                            <div class="w-full h-[2px] bg-gray-200 relative overflow-hidden">

                                <div class="absolute top-0 left-0 h-full bg-gold transition-all ease-linear"

                                     :style="bookState.isPressing ? 'width: 100%; transition-duration: 3000ms;' : 'width: 0%; transition-duration: 200ms;'"></div>

                            </div>

                        </div>

                        <p class="absolute bottom-10 text-[9px] text-sub/30 tracking-[0.2em] uppercase">3 Seconds</p>

                    </div>

                </div>

            </div>

        </div>



        <div class="tab-content" 

             x-show="activeTab === 'goals'"

             x-transition:enter="transition ease-out duration-500"

             x-transition:enter-start="opacity-0"

             x-transition:enter-end="opacity-100"

             x-transition:leave="transition ease-in duration-300"

             x-transition:leave-start="opacity-100"

             x-transition:leave-end="opacity-0">

             

             <div class="w-full max-w-md bg-white p-10 shadow-soft rounded-xl border border-gray-100">

                 <h2 class="text-xl font-serif text-ink mb-8 text-center">Daily Journal</h2>

                 <div class="flex items-center border-b border-gray-200 mb-8 pb-2">

                     <input type="text" x-model="newGoal" @keydown.enter="addGoal()" 

                            placeholder="Write a thought..." 

                            class="w-full py-2 focus:outline-none font-serif bg-transparent text-ink placeholder:text-sub/30">

                     <button @click="addGoal()" class="text-xl text-gold hover:text-ink transition-colors px-2">＋</button>

                 </div>

                 <ul class="space-y-4 max-h-[300px] overflow-y-auto no-scrollbar">

                     <template x-for="(g,i) in goals" :key="i">

                         <li class="flex items-center justify-between text-sm font-serif text-ink/80 pb-3 border-b border-dashed border-gray-50 group">

                             <div class="flex items-center gap-3">

                                 <button @click="removeGoal(i)" class="text-sub/20 hover:text-red-400 text-[10px] uppercase tracking-wider transition-colors">Del</button>

                                 <span class="text-gold text-[8px]">●</span>

                                 <span x-text="g.text"></span>

                             </div>

                             <span x-text="g.time" class="text-[9px] font-sans text-sub/40 ml-2 whitespace-nowrap"></span>

                         </li>

                     </template>

                 </ul>

                 <div x-show="goals.length === 0" class="text-center text-[10px] text-sub/30 py-4 uppercase tracking-widest">No entries yet</div>

             </div>

        </div>



    </main>



    <style>.animate-fade-in { animation: fadeIn 1s ease-out forwards; } .animate-fade-in-up { animation: fadeInUp 0.6s ease-out forwards; } @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } } @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } } .no-scrollbar::-webkit-scrollbar { display: none; } .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }</style>



    <script>

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {

            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();

            osc.connect(gain); gain.connect(audioCtx.destination);

            if (type === 'tick') {

                osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);

                gain.gain.setValueAtTime(0.05, audioCtx.currentTime); 

                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);

                osc.start(); osc.stop(audioCtx.currentTime + 0.1);

            } else if (type === 'open') {

                osc.type = 'triangle'; osc.frequency.setValueAtTime(200, audioCtx.currentTime);

                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);

                osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 1.5);

                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2);

                osc.start(); osc.stop(audioCtx.currentTime + 2);

            }

        }



        function appData() {

            return {

                activeTab: 'cards',

                // 更新后的导航文本

                tabs: [ { id: 'cards', label: '读心卡牌' }, { id: 'book', label: '答案之书' }, { id: 'goals', label: '日常记录' } ],

                

                // 1. 卡牌逻辑

                cardState: { selected: false, flipped: false, isShuffling: false },

                currentCard: { id: 0, image: '' },



                activateAudio() { if (audioCtx.state === 'suspended') audioCtx.resume(); },



                drawRandomCard() {

                    if(this.cardState.isShuffling) return;

                    this.cardState.isShuffling = true;

                    let shuffleInterval = setInterval(() => playSound('tick'), 100);

                    

                    setTimeout(() => {

                        clearInterval(shuffleInterval);

                        const randomIndex = Math.floor(Math.random() * 30);

                        this.currentCard.id = randomIndex;

                        this.currentCard.image = `images/${randomIndex + 1}.jpg`; 

                        

                        this.cardState.isShuffling = false;

                        this.cardState.selected = true; 

                        playSound('open');

                    }, 800);

                },

                

                resetCard() { this.cardState.selected = false; },

                    { cn: "当机会明确时，要下重注。其余时间，耐心等待。", en: "When the opportunity is clear, bet heavily. Otherwise, wait patiently." },

                    { cn: "建立自动化的好习惯，减少对意志力的依赖。", en: "Build automated habits to reduce reliance on willpower." },

                    { cn: "接受现实，即使它不符合你的愿望。与事实合作，而非对抗。", en: "Accept reality, even if it's unwanted. Work with facts, not against them." },

                    { cn: "在解决问题时，先定义问题，确保你在解决正确的问题。", en: "Define the problem first to ensure you are solving the right one." },

                    { cn: "知道何时退出与知道何时进入同样重要。", en: "Knowing when to quit is as important as knowing when to start." },

                    { cn: "最后，记住：简单，但不容易。", en: "Finally, remember: Simple, but not easy." }

                ],



                formatAnswer(text) {

                    return text.replace(/([，。；？！])/g, '<span class="text-ink/40">$1</span><br class="mb-3"/>');

                },



                startPress() {

                    if (this.bookState.isOpen) return;

                    this.bookState.isPressing = true;

                    this.tickInterval = setInterval(() => playSound('tick'), 500); 

                    this.bookState.timer = setTimeout(() => {

                        clearInterval(this.tickInterval);

                        this.openBook();

                    }, 3000);

                },

                endPress() {

                    if (this.bookState.isOpen) return;

                    clearTimeout(this.bookState.timer);

                    clearInterval(this.tickInterval);

                    this.bookState.isPressing = false;

                },

                openBook() {

                    this.bookState.isPressing = false;

                    this.currentAnswer = this.answers[Math.floor(Math.random() * this.answers.length)];

                    playSound('open');

                    this.bookState.isOpen = true;

                },

                resetBook() { this.bookState.isOpen = false; },



                // 3. Goals (带时间)

                newGoal: '', 

                goals: JSON.parse(localStorage.getItem('myGoals')) || [],

                addGoal() { 

                    if(this.newGoal.trim()) { 

                        const now = new Date();

                        const timeStr = `${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getDate().toString().padStart(2,'0')} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;

                        this.goals.push({ text: this.newGoal, time: timeStr }); 

                        this.newGoal=''; 

                        this.saveGoals();

                    } 

                },

                removeGoal(index) { this.goals.splice(index, 1); this.saveGoals(); },

                saveGoals() { localStorage.setItem('myGoals', JSON.stringify(this.goals)); },

                

                initApp() { },

                switchTab(id) { this.activeTab = id; }

            }

        }

    </script>
